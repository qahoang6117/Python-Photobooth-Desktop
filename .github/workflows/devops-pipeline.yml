name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  code-quality-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Linting Tool
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        
    - name: Check Python Syntax with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-and-push-docker:
    needs: code-quality-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Đăng nhập vào Docker Hub bằng các biến Secret bạn vừa cấu hình
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    # Khởi tạo môi trường Build
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    # Build và tự động đẩy (push) Image lên Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/photobooth-app:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/photobooth-app:${{ github.sha }}